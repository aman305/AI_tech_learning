<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>AI Mentor</title>

<style>

/* ---------- PAGE LAYOUT ---------- */

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:#202123;
color:white;
display:flex;
flex-direction:column;
}

.sidebar h3{
padding:15px;
margin:0;
border-bottom:1px solid #333;
}

.session{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.session:hover{
background:#333;
}

.newChat{
margin:10px;
padding:10px;
background:#2563eb;
border:none;
color:white;
cursor:pointer;
}

.main{
flex:1;
display:flex;
}

.leftPanel{
        width:280px;
        border-right:1px solid #ddd;
        padding:10px;
        background:#f8fafc;
        overflow:auto;
    }
    #curriculumPanel ul {
        margin: 0;
        padding-left: 12px;
    }
    #curriculumPanel li {
        margin-bottom: 6px;
    }
/* ---------- CHAT AREA ---------- */

.chatContainer{
flex:1;
display:flex;
flex-direction:column;
}

#chatBox{
flex:1;
overflow-y:auto;
padding:20px;
background:#f7f7f8;
}

.message{
max-width:70%;
padding:12px 16px;
border-radius:10px;
margin-bottom:10px;
white-space:pre-wrap;
line-height:1.4;
}

.message ai h1, .message ai h2, .message ai h3 {
margin: 8px 0;
}

.message.ai pre {
        background:#0d1117;
        color:#f0f6fc;
        padding:12px;
        border-radius:8px;
        overflow:auto;
        white-space:pre;
        font-family:Consolas, "Courier New", monospace;
        border:1px solid #333;
        margin:8px 0;
        font-size:13px;
    }

    .message.ai code {
        background:#eaf0ff;
        color:#0b0f1b;
        padding:2px 4px;
        border-radius:4px;
        font-family:Consolas, "Courier New", monospace;
        font-size:0.95em;
    }
.message.user{
background:#2563eb;
color:white;
margin-left:auto;
}

.message.ai{
background:white;
border:1px solid #ddd;
}

/* ---------- CHAT INPUT ---------- */

.chatInput{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

textarea{
flex:1;
padding:10px;
border-radius:8px;
resize:none;
}

.sendBtn{
margin-left:10px;
padding:10px 16px;
background:#2563eb;
border:none;
color:white;
cursor:pointer;
}

/* ---------- COMMAND BUTTONS ---------- */

.controls{
padding:10px;
border-top:1px solid #ddd;
background:#fafafa;
}

.controls button{
margin-right:5px;
padding:6px 10px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- ---------- LEFT SIDEBAR ---------- -->

<div class="sidebar">

<h3>Sessions</h3>

<button class="newChat" onclick="newSession()">+ New Chat</button>

<div id="sessionList"></div>

</div>

<!-- ---------- MAIN CONTENT ---------- -->

<div class="main">

<div class="leftPanel">

<h3>Course Progress</h3>
<div id="progressPanel"></div>
<div id="statusPanel" style="margin-top:8px; font-size:14px; color:#1f2937; padding:6px; border-radius:6px; background:#ecfdf3; border:1px solid #a7f3d0; display:none;">Lesson Locked: Answer current question first.</div>

<h3>Curriculum</h3>
<div id="curriculumPanel"></div>

</div>

<div class="chatContainer">

<div id="chatBox"></div>

<!-- ---------- AI COMMAND BUTTONS ---------- -->

<div class="controls">

<button onclick="sendCommand('next')">Next</button>
<button onclick="sendCommand('repeat')">Repeat</button>
<button onclick="sendCommand('exercise')">Exercise</button>
<button onclick="sendCommand('hint')">Hint</button>
<button onclick="sendCommand('summary')">Summary</button>

</div>

<!-- ---------- CHAT INPUT ---------- -->

<div class="chatInput">

<textarea id="userInput" placeholder="Message AI Teacher..."></textarea>

<button id="sendBtn" class="sendBtn" onclick="sendChatMessage()">Send</button>

</div>

</div>

</div>

<script>

/* ---------- CHAT ELEMENTS ---------- */

const chat=document.getElementById("chatBox")
const textarea=document.getElementById("userInput")
const sendBtn=document.getElementById("sendBtn")

/* ---------- LOAD LEARNING SETUP ---------- */

const learningSetup = JSON.parse(
localStorage.getItem("learningSetup")
)

let sessions=JSON.parse(localStorage.getItem("sessions"))||{}

let currentSession=null

renderSessions()
renderCurriculum([],0)

/* ---------- SESSION MANAGEMENT ---------- */

function newSession(){

const id="session_"+Date.now()

sessions[id]=[]

currentSession=id

saveSessions()

renderSessions()

chat.innerHTML=""

}

function saveSessions(){

localStorage.setItem("sessions",JSON.stringify(sessions))

}

function renderSessions(){

const list=document.getElementById("sessionList")

list.innerHTML=""

Object.keys(sessions).forEach(id=>{

const div=document.createElement("div")

div.className="session"

div.innerText=id

div.onclick=()=>loadSession(id)

list.appendChild(div)

})

}

function loadSession(id){

currentSession=id

chat.innerHTML=""

sessions[id].forEach(m=>{

addMessage(m.role,m.content)

})

}

/* ---------- MESSAGE UI ---------- */

function escapeHtml(str) {
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
}

function renderMarkdown(text){
    const codeBlocks = []
    text = text.replace(/```(?:[a-zA-Z0-9]*)\n([\s\S]*?)```/g, (m, p1) => {
        codeBlocks.push(escapeHtml(p1))
        return `@@CODE_BLOCK_${codeBlocks.length-1}@@`
    })

    let html = text
        .replace(/\n###\s*(.*)/g, "<h3>$1</h3>")
        .replace(/\n##\s*(.*)/g, "<h2>$1</h2>")
        .replace(/\n#\s*(.*)/g, "<h1>$1</h1>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\n\s*\-\s+(.*)/g, "<br>• $1")
        .replace(/\n\s*\d+\.\s+(.*)/g, "<br>$1")
        .replace(/\n---+/g, "<hr>")
        .replace(/\n/g, "<br>")

    html = html.replace(/@@CODE_BLOCK_(\d+)@@/g, (m, idx) => {
        const code = codeBlocks[Number(idx)] || ""
        return `<pre><code>${code}</code></pre>`
    })

    return html
}

function addMessage(role,text){

const div=document.createElement("div")

div.className="message "+role
if(role === 'ai'){
    div.innerHTML = renderMarkdown(text)
}else{
    div.innerText=text
}

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function createAIBubble(){

const div=document.createElement("div")

div.className="message ai"

chat.appendChild(div)

return div

}

function cleanTopicText(text){
    return text
        .replace(/\*\*/g, "")
        .replace(/\[(.*?)\]\((.*?)\)/g, "$1")
        .replace(/^\d+\.\s*/, "")
}

function renderCurriculum(curriculum, currentLesson){
    const panel = document.getElementById("curriculumPanel")
    const progressPanel = document.getElementById("progressPanel")

    panel.innerHTML = ""
    if (!curriculum || curriculum.length === 0) {
        panel.innerText = "No curriculum yet. Say 'hi' to start."
    } else {
        const ul = document.createElement("ul")
        ul.style.paddingLeft = "6px"
        ul.style.margin = "0"
        ul.style.listStyle = "none"
        curriculum.forEach((topic, idx) => {
            const li = document.createElement("li")
            const cleanTopic = cleanTopicText(String(topic))
            li.innerHTML = `<span style='font-weight:${idx===currentLesson?"700":"500"}; color:${idx===currentLesson?"#1f2937":"#111"};'>${idx + 1}. ${cleanTopic}</span>`
            li.style.marginBottom = "6px"
            li.style.padding = "4px 6px"
            li.style.borderRadius = "6px"
            li.style.cursor = "pointer"
            li.style.border = "1px solid transparent"
            if (idx === currentLesson) {
                li.style.background = "#e9f2ff"
                li.style.borderLeft = "3px solid #2563eb"
            } else if (idx < currentLesson) {
                li.style.background = "#ecfdf3"
                li.style.borderLeft = "3px solid #10b981"
                li.style.color = "#065f46"
            }
            li.onclick = () => {
                sendJumpTo(idx)
            }
            ul.appendChild(li)
        })
        panel.appendChild(ul)
    }

    if (typeof currentLesson === "number" && curriculum && curriculum.length > 0) {
        progressPanel.innerHTML = `<strong>Lesson ${Math.min(currentLesson + 1, curriculum.length)} of ${curriculum.length}</strong>`
    } else {
        progressPanel.innerText = "Start your first lesson."
    }
}

function updateLessonLock(isLocked) {
    const statusPanel = document.getElementById("statusPanel")
    if (isLocked) {
        statusPanel.style.display = "block"
        statusPanel.style.background = "#ffefef"
        statusPanel.style.border = "1px solid #fca5a5"
        statusPanel.style.color = "#991b1b"
        statusPanel.innerText = "🔒 Lesson locked: answer current question before proceeding."
        statusPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
    } else {
        statusPanel.style.display = "none"
    }
}

/* ---------- COMMAND BUTTONS ---------- */

function sendCommand(cmd){
    sendChatMessage(cmd)
}

function sendJumpTo(index) {
    sendChatMessage(`jump-to:${index}`)
}

/* ---------- ENTER KEY SEND ---------- */

textarea.addEventListener("keydown",(e)=>{
    if (e.key === "Enter" && !e.shiftKey && !e.altKey && !e.ctrlKey) {
        e.preventDefault()
        sendChatMessage(textarea.value)
    }
    if (e.key === "Enter" && e.altKey) {
        // Alt+Enter should add newline
        e.preventDefault()
        const start = textarea.selectionStart
        const end = textarea.selectionEnd
        textarea.value = textarea.value.slice(0, start) + "\n" + textarea.value.slice(end)
        textarea.selectionStart = textarea.selectionEnd = start + 1
    }
})

window.addEventListener('beforeunload', ()=>{
    localStorage.setItem('sessions', JSON.stringify(sessions))
})

/* ---------- MAIN CHAT FUNCTION ---------- */

async function sendChatMessage(customMessage){
    const message = (customMessage || textarea.value || "").trim()

    if (!message) return

    if (!currentSession) {
        newSession()
    }

    if (message !== textarea.value.trim()) {
        // do not modify textarea for commands / jumps
    } else {
        textarea.value = ""
    }

    addMessage("user", message)
    sessions[currentSession].push({ role: "user", content: message })

    const aiBubble = createAIBubble()
    aiBubble.innerText = "AI thinking..."
    sendBtn.disabled = true

    sendBtn.innerText = "Thinking..."
    try {
        console.log("Sending setup:", learningSetup)

        const response = await fetch("http://localhost:3000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message,
                sessionId: currentSession,
                setup: learningSetup
            })
        })

        const data = await response.json()

        aiBubble.innerHTML = renderMarkdown(data.reply)

        sessions[currentSession].push({
            role: "ai",
            content: data.reply
        })

        saveSessions()

        if (data.curriculum) {
            renderCurriculum(data.curriculum, data.currentLesson)
        }

        updateLessonLock(data.awaitingAnswer)
    } catch (err) {
        console.error("Send message error:", err)
        aiBubble.innerText = "Server error"
    } finally {
        sendBtn.disabled = false
        sendBtn.innerText = "Send"
    }
}
</script>

</body>
</html>
